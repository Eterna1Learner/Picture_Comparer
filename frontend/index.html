<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV结果对比工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 文件夹选择界面 -->
        <div id="folder-selection" class="panel active">
            <h1>CV结果对比工具</h1>
            <div class="folder-browser">
                <div class="folder-selection">
                    <h2>选择对比文件夹</h2>
                    
                    <!-- GT文件夹选择区域 -->
                    <div class="selection-group">
                        <h3>GT文件夹（必填）</h3>
                        <div class="folder-list-mini" id="gt-folder-list">
                            <!-- GT文件夹列表将通过JavaScript动态生成 -->
                        </div>
                        <div style="margin-top: 10px;">
                            <select id="gt-folder"></select>
                        </div>
                        <div style="margin-top: 5px;">
                            <label for="gt-folder-path" style="display: block; margin-bottom: 3px; font-weight: normal;">或直接输入路径：</label>
                            <input type="text" id="gt-folder-path" placeholder="例如：/home/haoyangyue/data/dataset/split_dataset/val" style="width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px;">
                        </div>
                    </div>
                    
                    <!-- 模型输出文件夹选择区域 -->
                    <div class="selection-group">
                        <h3>模型输出文件夹（可多选）</h3>
                        <div class="folder-list-mini" id="model-folder-list">
                            <!-- 模型文件夹列表将通过JavaScript动态生成 -->
                        </div>
                        <div style="margin-top: 10px;">
                            <select id="model-folders" multiple></select>
                        </div>
                        <div style="margin-top: 5px;">
                            <label for="model-folders-paths" style="display: block; margin-bottom: 3px; font-weight: normal;">或直接输入路径（多个路径用逗号分隔）：</label>
                            <input type="text" id="model-folders-paths" placeholder="例如：/home/haoyangyue/data/MambaIR-main/experiments/MambaIRv2_lightSR_x4/visualization/0" style="width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px;">
                        </div>
                    </div>
                    
                    <button id="compare-btn" class="compare-btn">确认对比</button>
                </div>
            </div>
        </div>

        <!-- 图像对比界面 -->
        <div id="image-comparison" class="panel">
            <div class="header">
                <button id="back-btn" class="back-btn">返回</button>
                <div class="image-selector">
                    <label for="image-list">选择图像：</label>
                    <select id="image-list"></select>
                </div>
                <div class="zoom-controls">
                    <label for="zoom-level">放大倍数：</label>
                    <input type="range" id="zoom-level" min="1" max="5" step="0.1" value="1">
                    <span id="zoom-value">1x</span>
                </div>
            </div>
            
            <div class="image-container">
                <div class="image-row">
                    <!-- 图像将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <!-- 放大查看区域 -->
            <div id="zoom-view" class="zoom-view">
                <div class="zoom-content">
                    <!-- 放大内容将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 确保页面加载完成后再初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
</body>
</html>
